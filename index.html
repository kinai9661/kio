<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIO Gateway - Image Generator</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222f;
  --border: #2e2e3e;
  --accent: #7c6fff;
  --accent2: #00d2ff;
  --text: #e8e8f0;
  --text2: #888899;
  --success: #22c55e;
  --error: #ef4444;
  --radius: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Layout ── */
.app { display: grid; grid-template-columns: 340px 1fr; min-height: 100vh; }
@media(max-width:800px){ .app{ grid-template-columns:1fr; } .sidebar{ border-right:none; border-bottom:1px solid var(--border); } }

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 28px 22px;
  display: flex; flex-direction: column; gap: 20px;
  overflow-y: auto;
}
.logo { display:flex; align-items:center; gap:10px; margin-bottom:4px; }
.logo-icon { width:38px; height:38px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; }
.logo h1 { font-size:1.3rem; font-weight:700; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.logo small { font-size:0.72rem; color:var(--text2); display:block; -webkit-text-fill-color:var(--text2); }

.section-label { font-size:0.7rem; font-weight:700; letter-spacing:.1em; color:var(--text2); text-transform:uppercase; margin-bottom:6px; }

.field { display:flex; flex-direction:column; gap:6px; }
.field label { font-size:0.82rem; color:var(--text2); font-weight:500; }
input[type=text], select, textarea {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 0.88rem;
  padding: 9px 12px;
  width: 100%;
  outline: none;
  transition: border-color .2s;
  font-family: inherit;
}
input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); }
select option { background: var(--surface2); }

textarea#prompt {
  min-height: 110px;
  resize: vertical;
  line-height: 1.6;
}

.row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.generate-btn {
  background: linear-gradient(135deg,var(--accent),var(--accent2));
  border: none; border-radius: var(--radius);
  color: #fff; font-size:0.95rem; font-weight:700;
  padding: 13px;
  cursor: pointer; width:100%;
  transition: opacity .2s, transform .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  position:relative; overflow:hidden;
}
.generate-btn:hover { opacity:.9; transform:translateY(-1px); }
.generate-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }
.generate-btn .btn-spinner {
  width:18px; height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
.generate-btn.loading .btn-spinner { display:block; }
.generate-btn.loading .btn-text { display:none; }

@keyframes spin { to { transform:rotate(360deg); } }

/* Progress bar */
.progress-wrap { display:none; }
.progress-wrap.show { display:block; }
.progress-label { font-size:0.75rem; color:var(--text2); margin-bottom:6px; }
.progress-bar { height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
.progress-fill {
  height:100%; width:0%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:99px;
  transition:width .4s ease;
  animation:pulse-bar 1.5s ease-in-out infinite;
}
@keyframes pulse-bar { 0%,100%{opacity:1} 50%{opacity:.6} }

/* Status badge */
.status { display:none; padding:10px 13px; border-radius:8px; font-size:0.82rem; margin-top:4px; }
.status.error { display:flex; gap:8px; background:rgba(239,68,68,.12); color:var(--error); border:1px solid rgba(239,68,68,.2); }
.status.success { display:flex; gap:8px; background:rgba(34,197,94,.1); color:var(--success); border:1px solid rgba(34,197,94,.2); }

/* ── Main area ── */
.main {
  padding: 28px;
  display:flex; flex-direction:column; gap:28px;
  overflow-y:auto;
}

/* Empty state */
.empty-state {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:14px; color:var(--text2); text-align:center;
  padding:60px 20px;
}
.empty-state .icon { font-size:4rem; opacity:.3; }
.empty-state h2 { font-size:1.1rem; color:var(--text2); font-weight:500; }
.empty-state p { font-size:0.82rem; max-width:260px; line-height:1.6; }

/* Result card */
.result-card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  animation:fadeUp .4s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

.result-img {
  width:100%;
  display:block;
  cursor:pointer;
  transition:transform .2s;
}
.result-img:hover { transform:scale(1.005); }

.result-meta {
  padding:16px 18px;
  display:flex; flex-direction:column; gap:8px;
}
.result-prompt {
  font-size:0.82rem;
  color:var(--text2);
  line-height:1.55;
}
.result-actions { display:flex; gap:10px; flex-wrap:wrap; }
.act-btn {
  padding:7px 16px;
  border-radius:8px;
  font-size:0.8rem; font-weight:600;
  cursor:pointer; border:none;
  transition:background .15s;
  text-decoration:none; display:inline-flex; align-items:center; gap:5px;
}
.act-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
.act-btn.secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.act-btn:hover { opacity:.85; }

/* History grid */
.history-section h2 { font-size:0.8rem; font-weight:700; letter-spacing:.08em; color:var(--text2); text-transform:uppercase; margin-bottom:14px; }
.history-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
}
.history-thumb {
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  transition:border-color .2s, transform .15s;
  position:relative;
  aspect-ratio:1;
  background:var(--surface);
}
.history-thumb:hover { border-color:var(--accent); transform:scale(1.03); }
.history-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.history-thumb .thumb-overlay {
  position:absolute; inset:0;
  background:rgba(0,0,0,.6);
  opacity:0; transition:opacity .2s;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
}
.history-thumb:hover .thumb-overlay { opacity:1; }

/* Lightbox */
.lightbox {
  display:none; position:fixed; inset:0; z-index:1000;
  background:rgba(0,0,0,.88);
  align-items:center; justify-content:center;
}
.lightbox.show { display:flex; }
.lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; }
.lightbox-close {
  position:fixed; top:20px; right:24px;
  background:rgba(255,255,255,.1); border:none; color:#fff;
  width:40px; height:40px; border-radius:50%; font-size:1.2rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
</style>
</head>
<body>

<div class="app">
  <!-- ─── Sidebar ─────────────────────────────────── -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">🎨</div>
      <div>
        <h1>KIO Gateway</h1>
        <small>OpenAI Compatible API</small>
      </div>
    </div>

    <div>
      <div class="section-label">API 設定</div>
      <div class="field">
        <label>Gateway URL</label>
        <input type="text" id="apiUrl" placeholder="https://kio-gateway.workers.dev">
      </div>
    </div>

    <div>
      <div class="section-label">圖像描述</div>
      <div class="field">
        <label>Prompt <span style="color:var(--text2);font-weight:400">(Ctrl+Enter 提交)</span></label>
        <textarea id="prompt" placeholder="一隻橘色貓咪在霓虹都市的屋頂，賽博龐克風格，電影光影，8K 超高清"></textarea>
      </div>
    </div>

    <div>
      <div class="section-label">參數設定</div>
      <div class="row2">
        <div class="field">
          <label>模型</label>
          <select id="model">
            <option value="medo-image" selected>medo-image</option>
            <option value="dall-e-3">DALL-E 3</option>
            <option value="dall-e-2">DALL-E 2</option>
            <option value="gpt-image-1">GPT Image 1</option>
          </select>
        </div>
        <div class="field">
          <label>品質</label>
          <select id="quality">
            <option value="standard">標準</option>
            <option value="high">高品質 HD</option>
          </select>
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>尺寸</label>
        <select id="size">
          <option value="1024x1024">1:1 正方形 (1024×1024)</option>
          <option value="1024x1792">9:16 豎向 (1024×1792)</option>
          <option value="1792x1024">16:9 橫向 (1792×1024)</option>
          <option value="512x512">小圖 (512×512)</option>
        </select>
      </div>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">正在生成圖像...</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <button class="generate-btn" id="generateBtn" type="button">
      <span class="btn-text">✨ 生成圖像</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="status" id="statusMsg"></div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────── -->
  <main class="main" id="main">
    <div class="empty-state" id="emptyState">
      <div class="icon">🖼️</div>
      <h2>尚未生成任何圖像</h2>
      <p>在左側填入描述並點擊「生成圖像」，結果將顯示在這裡</p>
    </div>

    <!-- 最新結果 -->
    <div id="latestResult" style="display:none"></div>

    <!-- 歷史紀錄 -->
    <div class="history-section" id="historySection" style="display:none">
      <h2>🕘 歷史紀錄</h2>
      <div class="history-grid" id="historyGrid"></div>
    </div>
  </main>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── State ───────────────────────────────────────────────────
let history = JSON.parse(localStorage.getItem('kio_history') || '[]');
let progressTimer = null;

const $ = id => document.getElementById(id);
const apiUrlEl    = $('apiUrl');
const promptEl    = $('prompt');
const modelEl     = $('model');
const qualityEl   = $('quality');
const sizeEl      = $('size');
const generateBtn = $('generateBtn');
const statusMsg   = $('statusMsg');
const progressWrap= $('progressWrap');
const progressFill= $('progressFill');
const progressLbl = $('progressLabel');
const emptyState  = $('emptyState');
const latestResult= $('latestResult');
const historySection=$('historySection');
const historyGrid = $('historyGrid');
const lightbox    = $('lightbox');
const lightboxImg = $('lightboxImg');

// Restore saved URL
const savedUrl = localStorage.getItem('kio_api_url');
if (savedUrl) apiUrlEl.value = savedUrl;
apiUrlEl.addEventListener('change', () => localStorage.setItem('kio_api_url', apiUrlEl.value.trim()));

// ── Helpers ─────────────────────────────────────────────────
function showStatus(type, msg) {
  statusMsg.className = `status ${type}`;
  statusMsg.textContent = (type === 'error' ? '❌ ' : '✅ ') + msg;
}

function startProgress(label = '正在提交任務...') {
  progressWrap.classList.add('show');
  progressLbl.textContent = label;
  let pct = 0;
  progressFill.style.width = '0%';
  progressTimer = setInterval(() => {
    pct = Math.min(pct + (pct < 60 ? 3 : pct < 85 ? 1 : 0.3), 95);
    progressFill.style.width = pct + '%';
  }, 400);
}

function finishProgress() {
  clearInterval(progressTimer);
  progressFill.style.width = '100%';
  setTimeout(() => progressWrap.classList.remove('show'), 600);
}

function setLoading(on) {
  generateBtn.disabled = on;
  generateBtn.classList.toggle('loading', on);
  if (on) startProgress();
  else finishProgress();
}

// ── Image card builder ─────────────────────────────────────
function buildCard(imgSrc, prompt, revisedPrompt, isHistory = false) {
  const card = document.createElement('div');
  card.className = 'result-card';

  const img = document.createElement('img');
  img.src = imgSrc;
  img.className = 'result-img';
  img.alt = 'Generated image';
  img.addEventListener('click', () => openLightbox(imgSrc));
  card.appendChild(img);

  const meta = document.createElement('div');
  meta.className = 'result-meta';

  const pEl = document.createElement('p');
  pEl.className = 'result-prompt';
  pEl.textContent = revisedPrompt ? `🤖 ${revisedPrompt}` : `📝 ${prompt}`;
  meta.appendChild(pEl);

  const actions = document.createElement('div');
  actions.className = 'result-actions';

  const dlBtn = document.createElement('a');
  dlBtn.className = 'act-btn primary';
  dlBtn.href = imgSrc;
  dlBtn.download = `kio-${Date.now()}.png`;
  dlBtn.innerHTML = '⬇️ 下載';
  actions.appendChild(dlBtn);

  const copyBtn = document.createElement('button');
  copyBtn.className = 'act-btn secondary';
  copyBtn.innerHTML = '📋 複製 URL';
  copyBtn.onclick = () => { navigator.clipboard.writeText(imgSrc); copyBtn.textContent = '✅ 已複製'; setTimeout(()=>copyBtn.innerHTML='📋 複製 URL',2000); };
  actions.appendChild(copyBtn);

  const lbBtn = document.createElement('button');
  lbBtn.className = 'act-btn secondary';
  lbBtn.innerHTML = '🔍 全螢幕';
  lbBtn.onclick = () => openLightbox(imgSrc);
  actions.appendChild(lbBtn);

  meta.appendChild(actions);
  card.appendChild(meta);
  return card;
}

// ── History ─────────────────────────────────────────────────
function saveHistory(imgSrc, prompt) {
  history.unshift({ src: imgSrc, prompt, ts: Date.now() });
  if (history.length > 20) history = history.slice(0, 20);
  localStorage.setItem('kio_history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  if (history.length <= 1) return;
  historySection.style.display = 'block';
  historyGrid.innerHTML = '';
  history.slice(1).forEach(item => {
    const thumb = document.createElement('div');
    thumb.className = 'history-thumb';
    const img = document.createElement('img');
    img.src = item.src;
    img.alt = item.prompt;
    const overlay = document.createElement('div');
    overlay.className = 'thumb-overlay';
    overlay.textContent = '🔍';
    thumb.appendChild(img);
    thumb.appendChild(overlay);
    thumb.addEventListener('click', () => openLightbox(item.src));
    historyGrid.appendChild(thumb);
  });
}

// ── Lightbox ─────────────────────────────────────────────────
function openLightbox(src) {
  lightboxImg.src = src;
  lightbox.classList.add('show');
}
$('lightboxClose').onclick = () => lightbox.classList.remove('show');
lightbox.addEventListener('click', e => { if(e.target===lightbox) lightbox.classList.remove('show'); });

// ── Generate ─────────────────────────────────────────────────
async function generate() {
  const apiUrl = apiUrlEl.value.trim() || window.location.origin;
  const prompt = promptEl.value.trim();
  const model   = modelEl.value;
  const quality = qualityEl.value;
  const size    = sizeEl.value;

  if (!prompt) { showStatus('error', '請輸入圖像描述'); return; }

  statusMsg.className = 'status';
  setLoading(true);
  progressLbl.textContent = '正在送出請求...';

  try {
    const res = await fetch(`${apiUrl}/v1/images/generations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model, size, quality, n: 1, response_format: 'url' })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    progressLbl.textContent = '處理回應...';

    const item = data?.data?.[0];
    if (!item) throw new Error('回應中未找到圖像數據');

    // 支援 url 或 b64_json
    let imgSrc = item.url || null;
    if (!imgSrc && item.b64_json) imgSrc = `data:image/png;base64,${item.b64_json}`;
    if (!imgSrc) throw new Error('無法解析圖像 URL 或 Base64 數據');

    const revised = item.revised_prompt || null;

    // 顯示最新結果
    emptyState.style.display = 'none';
    latestResult.style.display = 'block';
    latestResult.innerHTML = '';
    latestResult.appendChild(buildCard(imgSrc, prompt, revised));

    saveHistory(imgSrc, prompt);
    showStatus('success', '圖像生成成功！');

  } catch(err) {
    showStatus('error', err.message);
  } finally {
    setLoading(false);
  }
}

// ── Events ──────────────────────────────────────────────────
generateBtn.addEventListener('click', generate);
promptEl.addEventListener('keydown', e => { if(e.key==='Enter' && e.ctrlKey){ e.preventDefault(); generate(); } });

// Restore history on load
if (history.length > 0) {
  const last = history[0];
  emptyState.style.display = 'none';
  latestResult.style.display = 'block';
  latestResult.appendChild(buildCard(last.src, last.prompt, null, true));
  renderHistory();
}
</script>
</body>
</html>
