<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI 圖像生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; font-size: 1.1rem; }
        .content { padding: 30px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        .form-group textarea {
            width: 100%; min-height: 120px; padding: 12px 15px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 1rem; resize: vertical; font-family: inherit;
            transition: border-color 0.3s;
        }
        .form-group textarea:focus { outline: none; border-color: #4facfe; }
        .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .option-group { background: #f8f9ff; padding: 20px; border-radius: 15px; }
        .option-group h3 { margin-bottom: 15px; color: #4facfe; }
        .option-group select {
            width: 100%; padding: 10px 12px;
            border: 2px solid #e0e0e0; border-radius: 8px;
            font-size: 0.95rem;
        }
        .option-group select:focus { outline: none; border-color: #4facfe; }
        .form-group input {
            width: 100%; padding: 12px 15px;
            border: 2px solid #e0e0e0; border-radius: 10px;
            font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: #4facfe; }
        .btn {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white; border: none; padding: 15px 30px;
            font-size: 1.1rem; font-weight: 600; border-radius: 50px;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(79,172,254,0.4);
            width: 100%; max-width: 300px; display: block; margin: 0 auto;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,172,254,0.6); }
        .btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        .spinner { display: none; text-align: center; margin: 20px 0; }
        .spinner::after {
            content: ''; display: inline-block; width: 40px; height: 40px;
            border: 4px solid #e0e0e0; border-top-color: #4facfe;
            border-radius: 50%; animation: spin 0.8s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-section { margin-top: 30px; padding: 25px; background: #f8f9ff; border-radius: 15px; display: none; }
        .result-section h2 { color: #4facfe; margin-bottom: 20px; }
        .image-container { text-align: center; margin-bottom: 20px; }
        .image-container img { max-width: 100%; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .download-btn {
            display: inline-block; background: #4facfe; color: white;
            padding: 10px 25px; border-radius: 25px; text-decoration: none;
            font-weight: 600; transition: background 0.3s; margin-top: 10px;
        }
        .download-btn:hover { background: #3a8bff; }
        .error-msg { background: #ffebee; color: #c62828; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .success-msg { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; }
        .revised-prompt { font-size: 0.9rem; color: #777; margin-top: 10px; font-style: italic; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .options { grid-template-columns: 1fr; }
            .content, .header { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎨 KIO 圖像生成器</h1>
            <p>OpenAI Compatible API Gateway</p>
        </div>
        <div class="content">
            <form id="imageForm">
                <div class="form-group">
                    <label>🔗 API 閘道 URL</label>
                    <input type="text" id="apiUrl" placeholder="https://kio-gateway.your-subdomain.workers.dev" value="">
                </div>
                <div class="form-group">
                    <label>📝 圖像描述 (Prompt)</label>
                    <textarea id="prompt" placeholder="例如：一隻可愛的橘色貓咪在太空中玩耍，超寫實風格，8K 高解析度&#10;&#10;Ctrl+Enter 快速提交"></textarea>
                </div>
                <div class="options">
                    <div class="option-group">
                        <h3>🤖 模型</h3>
                        <select id="model">
                            <option value="dall-e-3">DALL-E 3</option>
                            <option value="dall-e-2">DALL-E 2</option>
                            <option value="gpt-image-1">GPT Image 1</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <h3>📏 尺寸</h3>
                        <select id="size">
                            <option value="1024x1024">正方形 1024x1024</option>
                            <option value="1024x1792">豎向 1024x1792</option>
                            <option value="1792x1024">橫向 1792x1024</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <h3>✨ 品質</h3>
                        <select id="quality">
                            <option value="standard">標準</option>
                            <option value="high">高品質 (HD)</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn" id="generateBtn">🎨 生成圖像</button>
            </form>
            <div class="spinner" id="spinner"></div>
            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>
            <div class="result-section" id="resultSection">
                <h2>🖼️ 生成結果</h2>
                <div class="image-container">
                    <img id="generatedImage" alt="生成的圖像">
                </div>
                <p class="revised-prompt" id="revisedPrompt"></p>
                <a href="" id="downloadLink" class="download-btn" download="kio-generated.png">⬇️ 下載圖像</a>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('imageForm');
        const generateBtn = document.getElementById('generateBtn');
        const spinner = document.getElementById('spinner');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const resultSection = document.getElementById('resultSection');
        const generatedImage = document.getElementById('generatedImage');
        const revisedPromptEl = document.getElementById('revisedPrompt');
        const downloadLink = document.getElementById('downloadLink');

        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                form.dispatchEvent(new Event('submit'));
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            resultSection.style.display = 'none';

            const apiUrl = document.getElementById('apiUrl').value.trim() || window.location.origin;
            const prompt = document.getElementById('prompt').value.trim();
            const model = document.getElementById('model').value;
            const size = document.getElementById('size').value;
            const quality = document.getElementById('quality').value;

            if (!prompt) {
                errorMsg.textContent = '請輸入圖像描述';
                errorMsg.style.display = 'block';
                return;
            }

            generateBtn.disabled = true;
            generateBtn.textContent = '⏳ 生成中...';
            spinner.style.display = 'block';

            try {
                const res = await fetch(`${apiUrl}/v1/images/generations`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, model, size, quality, n: 1, response_format: 'b64_json' })
                });

                if (!res.ok) {
                    const errData = await res.json().catch(() => ({}));
                    throw new Error(errData?.error?.message || `HTTP ${res.status}`);
                }

                const data = await res.json();
                if (data?.data?.[0]?.b64_json) {
                    const imgSrc = `data:image/png;base64,${data.data[0].b64_json}`;
                    generatedImage.src = imgSrc;
                    downloadLink.href = imgSrc;
                    revisedPromptEl.textContent = data.data[0].revised_prompt ? `🤖 優化提示詞：${data.data[0].revised_prompt}` : '';
                    resultSection.style.display = 'block';
                    successMsg.textContent = '✅ 圖像生成成功！';
                    successMsg.style.display = 'block';
                } else {
                    throw new Error('未返回圖像數據');
                }
            } catch (err) {
                errorMsg.textContent = `❌ 錯誤：${err.message}`;
                errorMsg.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                generateBtn.textContent = '🎨 生成圖像';
                spinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
